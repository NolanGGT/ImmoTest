name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── Type check both apps before triggering deployment ─────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check API
        run: npm run type-check --workspace=apps/api

      - name: Type check Web
        run: npm run type-check --workspace=apps/web

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Trigger Coolify webhooks after checks pass ────────────────────────────
  notify-coolify:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deployment — API
        run: curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_API }}"

      - name: Trigger Coolify deployment — Web
        run: curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_WEB }}"
